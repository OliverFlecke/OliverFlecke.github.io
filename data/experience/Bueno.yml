Company: Bueno Technologies
Location: Singapore
Start: 2024-01-01
JobTitle: CTO & Co-Founder
Description: |
  Co-founder of [Bueno Technologies](https://bueno.money), focused on helping businesses streamline their cashflow by helping them offer credit terms for their business-to-business trades, while still getting paid on day 1, risk free. I drive the technical side of Bueno, from building and managing the product and the team around it.
Details: |
  - Developed web app for suppliers and customers to manage their invoices and credit.
  - Designed and build an event-driven backend architecture spanning invoice management, credit, insurance, notifications, and various integrations, such as Singpass, ACRA, Twilio, and ERPs.
  - Implemented fully automated CI/CD pipelines to multi environment k8 clusters with observability stack and self-managed services.
  - Introduced high accuracy (>99.9%) LLM-based user workflows to assist data extraction and validation enabling one-click payment acceleration and streamlined operation flow.
  - Tech stack: TypeScript (React), C\#, Rust, PostgreSQL, Kafka, Redis, and more.
